			<p style="color:#2c3e50;font-weight: bold;font-size: 18px;" id="ts-api-key"></p>
			<p id="Relay1">Relay 1: OFF</p>
			<button type="button" id="btnRelay1ON" class="buttonON deactiveBtn btnDeactivated" onclick="Relay1ON()">OFF</button>
			<button type="button" id="btnRelay1OFF" class="buttonOFF deactiveBtn btnDeactivated" onclick="Relay1OFF()">ON</button>
			<p>Relay 1 Status</p>
			<iframe width="450" height="260" style="border: 1px solid #cccccc;" src="https://thingspeak.com/channels/2091774/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=step&yaxismax=10&yaxismin=0"></iframe>

			<script>
				
				function Relay1ON(){
				
            	setTimeout(function(){
				document.getElementById("Relay1").innerHTML = "Relay 1: OFF";
				document.getElementById("btnRelay1ON").classList.remove("btnDeactivated");
				document.getElementById("btnRelay1OFF").classList.add("btnDeactivated");
				document.getElementById("btnRelay1ON").disabled = true;
				document.getElementById("btnRelay1ON").disabled = false;
				},2000);
				}
	
				function Relay1OFF(){
				document.getElementById("Relay1").innerHTML = "Relay 1: ON";
				document.getElementById("btnRelay1OFF").classList.remove("btnDeactivated");
				document.getElementById("btnRelay1ON").classList.add("btnDeactivated");
				}
			</script>
			
			<script>	
				document.getElementById('btnRelay1ON').addEventListener('click', function() {
					var ts_api_key = document.getElementById('ts-api-key').value;
					var url = "https://api.thingspeak.com/update?api_key=283FB7UWIAJ6LPHO&field1=0"
					$.getJSON(url, function(data) {
						console.log(data);
					});
				});

					var ts_api_key = document.getElementById('ts-api-key').value;
